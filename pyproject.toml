[tool.ruff]
required-version = ">=0.15"

[tool.codespell]
# Keep spelling checks focused on source/docs and skip generated/cache content.
skip = ".git,.venv,.venv39,build,**/build,.pytest_cache,__pycache__,resource/images,*.svg"
ignore-words-list = "nddshome,connextdds,rtisetenv,dpqoslib,unsecure"
check-hidden = false

[tool.pytest.ini_options]
testpaths = ["tests"]

