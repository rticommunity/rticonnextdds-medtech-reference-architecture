[tool.ruff]
required-version = ">=0.15"

[tool.codespell]
# Keep spelling checks focused on source/docs and skip generated/cache content.
skip = ".git,.venv,.venv39,build,**/build,.pytest_cache,__pycache__,resource/images,*.svg"
ignore-words-list = "nddshome,connextdds,rtisetenv,dpqoslib,unsecure"
check-hidden = false

[tool.pytest.ini_options]
testpaths = [
    "tests",
    "modules/01-operating-room/tests",
    "modules/02-record-playback/tests",
    "modules/04-security-threat/tests",
]
markers = [
    "build_pipeline: tests that verify project-level configure/build pipeline",
    "gui: test requires a graphical display (deselect with '-m not gui')",
    "secure: test requires DDS Security artifacts (deselect with '-m not secure')",
    "slow: long-running scenario",
]
addopts = "-rs"

[tool.rumdl]
disable = ["MD013"]

[tool.rumdl.MD024]
siblings-only = true

[tool.rumdl.MD033]
allowed-elements = ["details", "summary", "strong"]

[tool.rumdl.MD060]
style = "compact"
