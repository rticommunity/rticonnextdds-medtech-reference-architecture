[tool.ruff]
line-length = 120
target-version = "py39"
# Only lint test infrastructure and CI files; exclude pre-existing application source
extend-exclude = [
    "modules/01-operating-room/src/",
    "modules/01-operating-room/scripts/",
    "modules/04-security-threat/src/",
    "modules/04-security-threat/scripts/",
    "modules/04-security-threat/security/",
    "system_arch/",
    "resource/",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
]

[tool.ruff.lint.per-file-ignores]
# E402: sys.path manipulation required before imports
"build.py" = ["E402"]
"launch.py" = ["E402"]
"tests/test_build.py" = ["E402"]
# Test files may have unused imports for readability
"**/tests/*.py" = ["F401"]
"**/tests/conftest.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
