# ==========================================================================
# Docker Compose for RTI MedTech Reference Architecture
#
# Prerequisites:
#   Set RTI_LICENSE_FILE to the path of your rti_license.dat:
#     export RTI_LICENSE_FILE=/path/to/rti_license.dat
#
#   Or, if the license is at the standard $NDDSHOME location on your host,
#   e.g. /opt/rti.com/rti_connext_dds-7.7.0/rti_license.dat, point to it.
#
# Usage:
#   # Run all tests (default: verbose)
#   docker compose -f tests/docker/docker-compose.yml run --rm --build test
#
#   # Run specific tests with custom args
#   docker compose -f tests/docker/docker-compose.yml run --rm --build test \
#       -v modules/01-operating-room/tests/test_types.py
#
#   # Run tests matching a pattern
#   docker compose -f tests/docker/docker-compose.yml run --rm --build test \
#       -k "test_types"
#
#   # Clean up
#   docker compose -f tests/docker/docker-compose.yml down --remove-orphans
# ==========================================================================

services:

  # Primary test service, used for CI and local testing.
  # Can be extended for testing variations of dependency versions.
  test:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile
      target: test
    image: medtech-test:latest
    stdin_open: false
    tty: false
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${RTI_LICENSE_FILE:?Set RTI_LICENSE_FILE to the path of your rti_license.dat}:/opt/rti.com/rti_license.dat:ro

  # Test with Connext 7.3 LTS to validate backward compatibility.
  # Note: this service is NOT run as part of CI.
  test-connext-73:
    extends:
      service: test
    build:
      args:
        CONNEXT_VERSION: "7.3.1"
        CONNEXTDDS_ARCH: x64Linux4gcc7.3.0
        PYTHON_VERSION: "3.9"
    image: medtech-test:7.3.1
